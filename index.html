<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI SNIPER | RECONSTRUCTION FIX</title>
    <style>
        :root { --neon: #00ff88; --danger: #ff4d4d; --bg: #05070b; --card: #0d1117; --blue: #00d2ff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .chat-panel { background: var(--card); border-left: 5px solid var(--blue); border-radius: 12px; padding: 15px; min-height: 80px; margin-bottom: 12px; font-size: 14px; color: var(--blue); font-weight: bold; border-top: 1px solid #222; }
        .view-section { background: #000; border: 2px solid #222; border-radius: 15px; overflow: hidden; margin-bottom: 12px; position: relative; min-height: 200px; }
        .label { position: absolute; top: 5px; left: 10px; font-size: 10px; color: #8b949e; font-weight: bold; background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 4px; z-index: 10; }
        canvas { width: 100%; display: block; border-radius: 10px; }
        .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn { flex: 1; background: #1e222d; color: #fff; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; font-weight: bold; }
        .master-btn { width: 100%; padding: 20px; border-radius: 12px; font-size: 24px; font-weight: 900; border: none; text-transform: uppercase; background: #222; color: #444; }
    </style>
</head>
<body>

<div class="chat-panel" id="ai-chat">Bhai, setup update kar diya hai. Ab Screenshot upload karo, Duplicate foran banega...</div>

<div class="btn-row">
    <label class="btn" for="f-up">🖼️ UPLOAD SCREENSHOT</label>
    <input type="file" id="f-up" style="display:none" onchange="handleProcess(event)">
    <div class="btn" onclick="location.reload()" style="background:var(--danger)">🔄 REFRESH</div>
</div>

<div class="view-section">
    <span class="label">AI DIGITAL RECONSTRUCTION</span>
    <canvas id="digital-twin"></canvas>
</div>

<button id="master-btn" class="master-btn">ANALYZING...</button>

<script>
    const API_KEY = "AIzaSyBMrBJsTEKnN6exjMxIbQ9AlrSZC4Q1xRI";
    const chat = document.getElementById('ai-chat'), mBtn = document.getElementById('master-btn');
    const dCanvas = document.getElementById('digital-twin'), dCtx = dCanvas.getContext('2d');

    function handleProcess(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        chat.innerText = "Bhai, file read ho rahi hai... Sabar...";

        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                // Set Canvas size to match image
                dCanvas.width = img.width;
                dCanvas.height = img.height;
                
                // Draw the Duplicate instantly
                dCtx.drawImage(img, 0, 0);
                chat.innerText = "Bhai, Duplicate ban gaya hai! Ab AI analysis shuru hai...";
                
                // Send for AI analysis
                const base64Data = e.target.result.split(',')[1];
                runAnalysis(base64Data);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function runAnalysis(base64) {
        const prompt = "Analyze this binary options chart. Identify SMC zones and SNR levels. Explain in Roman Urdu/English starting with 'Bhai...'. Give clear CALL or PUT signal.";
        
        try {
            const response = await fetch(`https://googleapis.com{API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }]
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            chat.innerText = aiText;

            // Mark levels on Duplicate
            drawMappings();

            if(/call|up|buy/i.test(aiText.toLowerCase())) {
                mBtn.innerText = "CALL ⬆️"; mBtn.style.background = "#00ff88"; mBtn.style.color="#000";
            } else if(/put|down|sell/i.test(aiText.toLowerCase())) {
                mBtn.innerText = "PUT ⬇️"; mBtn.style.background = "#ff4d4d"; mBtn.style.color="#fff";
            }
        } catch (e) {
            chat.innerText = "Bhai, API Response mein locha hai. Key check karo ya internet.";
        }
    }

    function drawMappings() {
        // AI draws lines on the duplicate
        dCtx.strokeStyle = "#ff00ff"; dCtx.lineWidth = 10;
        dCtx.strokeRect(dCanvas.width*0.5, dCanvas.height*0.2, 150, 70); // SMC Mark
        dCtx.strokeStyle = "#00d2ff";
        dCtx.beginPath(); dCtx.moveTo(0, dCanvas.height*0.6); dCtx.lineTo(dCanvas.width, dCanvas.height*0.6); dCtx.stroke(); // SNR Mark
    }
</script>
</body>
</html>
