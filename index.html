<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI SNIPER | FINAL REPAIR</title>
    <style>
        :root { --neon: #00ff88; --danger: #ff4d4d; --bg: #05070b; --card: #0d1117; --blue: #00d2ff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .chat-panel { background: var(--card); border-left: 5px solid var(--blue); border-radius: 12px; padding: 15px; min-height: 80px; margin-bottom: 12px; font-size: 14px; color: var(--blue); font-weight: bold; border-top: 1px solid #222; }
        .vision-box { background: #000; border: 2px solid var(--neon); border-radius: 15px; overflow: hidden; margin-bottom: 12px; position: relative; min-height: 220px; display: flex; align-items: center; justify-content: center; }
        video, #preview-img { width: 100%; height: auto; display: block; border-radius: 12px; filter: contrast(120%) brightness(110%); }
        canvas { display: none; } 
        .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn { flex: 1; background: #1e222d; color: #fff; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; font-weight: bold; cursor: pointer; font-size: 12px; }
        .master-btn { width: 100%; padding: 20px; border-radius: 12px; font-size: 26px; font-weight: 900; border: none; text-transform: uppercase; background: #222; color: #444; transition: 0.3s; }
    </style>
</head>
<body>

<div class="chat-panel" id="ai-chat">Bhai, Nayi Key connect ho gayi hai. Chart upload karo ya Video on karo, ab AI foran signal dega...</div>

<div class="btn-row">
    <div class="btn" onclick="startHDVideo()">🎥 LIVE HD</div>
    <label class="btn" for="f-up">🖼️ UPLOAD CHART</label>
    <input type="file" id="f-up" style="display:none" onchange="handleImage(event)" accept="image/*">
</div>

<div class="vision-box">
    <video id="video" autoplay playsinline style="display:none"></video>
    <img id="preview-img" style="display:none">
    <canvas id="hidden-canvas"></canvas>
</div>

<button id="master-btn" class="master-btn">SCANNING...</button>

<script>
    const API_KEY = "AIzaSyBZjsFBtFDiiSVQlFsUglenMuJdzbYph7w"; // New Key Locked
    const chat = document.getElementById('ai-chat'), mBtn = document.getElementById('master-btn');
    const v = document.getElementById('video'), pImg = document.getElementById('preview-img');
    const hCanvas = document.getElementById('hidden-canvas'), hCtx = hCanvas.getContext('2d');

    async function startHDVideo() {
        pImg.style.display = "none"; v.style.display = "block";
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } });
            v.srcObject = s;
            chat.innerText = "Bhai, Video live hai. Har 10 sec baad auto-scan chal raha hai...";
            setInterval(captureAndAnalyze, 10000);
        } catch (e) { alert("Camera Permission do bhai!"); }
    }

    function handleImage(e) {
        v.style.display = "none"; pImg.style.display = "block";
        const r = new FileReader();
        r.onload = (f) => {
            pImg.src = f.target.result;
            chat.innerText = "Bhai, image mil gayi! AI analysis shuru hai...";
            runAI(f.target.result.split(',')[1]);
        };
        r.readAsDataURL(e.target.files[0]);
    }

    function captureAndAnalyze() {
        hCanvas.width = v.videoWidth; hCanvas.height = v.videoHeight;
        hCtx.drawImage(v, 0, 0);
        runAI(hCanvas.toDataURL('image/jpeg').split(',')[1]);
    }

    async function runAI(base64Data) {
        const prompt = "Analyze this binary chart. Identify SMC zones, SNR, and Trends. Start with 'Bhai...'. Talk in Roman Urdu. Tell me CALL or PUT, Expiry time, and Confidence. Be extremely accurate.";
        try {
            const resp = await fetch(`https://googleapis.com{API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Data } }] }] })
            });
            const d = await resp.json();
            const txt = d.candidates[0].content.parts[0].text;
            chat.innerText = txt;

            if(/call|up|buy/i.test(txt)) {
                mBtn.innerText = "CALL ⬆️"; mBtn.style.background = "#00ff88"; mBtn.style.color="#000";
            } else if(/put|down|sell/i.test(txt)) {
                mBtn.innerText = "PUT ⬇️"; mBtn.style.background = "#ff4d4d"; mBtn.style.color="#fff";
            }
        } catch (err) { 
            chat.innerText = "Bhai, API Response nahi aayi. Nayi key par thoda wait karo, 1-2 min baad refresh karo."; 
        }
    }
</script>
</body>
</html>
