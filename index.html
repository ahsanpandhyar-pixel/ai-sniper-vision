<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI SNIPER | GOD MODE FIX</title>
    <style>
        :root { --neon: #00ff88; --danger: #ff4d4d; --bg: #05070b; --card: #0d1117; --blue: #00d2ff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .chat-panel { background: var(--card); border-left: 5px solid var(--blue); border-radius: 12px; padding: 15px; min-height: 80px; margin-bottom: 12px; font-size: 14px; color: var(--blue); font-weight: bold; border-top: 1px solid #222; }
        .vision-box { background: #000; border: 2px solid var(--neon); border-radius: 15px; overflow: hidden; margin-bottom: 12px; position: relative; min-height: 250px; }
        .label { position: absolute; top: 10px; left: 10px; font-size: 10px; color: var(--neon); font-weight: bold; background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 5px; z-index: 100; }
        canvas { width: 100%; display: block; border-radius: 12px; }
        .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn { flex: 1; background: #1e222d; color: #fff; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; font-weight: bold; cursor: pointer; }
        .master-btn { width: 100%; padding: 20px; border-radius: 12px; font-size: 26px; font-weight: 900; border: none; text-transform: uppercase; background: #222; color: #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="chat-panel" id="ai-chat">Bhai, setup full reset kar diya hai. Ab Screenshot upload karo, Duplicate 100% banega aur AI bolay ga...</div>

<div class="btn-row">
    <label class="btn" for="f-up">🖼️ UPLOAD CHART</label>
    <input type="file" id="f-up" style="display:none" onchange="handleProcess(event)">
    <div class="btn" onclick="location.reload()" style="background:var(--danger)">🔄 REFRESH</div>
</div>

<div class="vision-box">
    <span class="label">AI DIGITAL TWIN MAPPING</span>
    <canvas id="digital-twin"></canvas>
</div>

<button id="master-btn" class="master-btn">SCANNING...</button>

<script>
    const API_KEY = "AIzaSyBMrBJsTEKnN6exjMxIbQ9AlrSZC4Q1xRI";
    const chat = document.getElementById('ai-chat'), mBtn = document.getElementById('master-btn');
    const dCanvas = document.getElementById('digital-twin'), dCtx = dCanvas.getContext('2d');

    function handleProcess(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        chat.innerText = "Bhai, AI image process kar raha hai... Thoda wait karo...";

        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                // Exact Mirror Creation
                dCanvas.width = img.width;
                dCanvas.height = img.height;
                dCtx.drawImage(img, 0, 0);
                
                // Drawing Mock Levels instantly so you see action
                drawAction();
                
                // Real AI Call
                const base64Data = e.target.result.split(',')[1];
                runAnalysis(base64Data);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function runAnalysis(base64) {
        // AI Prompt specifically in Roman Urdu
        const prompt = "Analyze this binary chart image carefully. Start your response with 'Bhai...'. Explain SMC zones, SNR, and FVG gaps in Roman Urdu/English. Tell me if I should take a CALL or PUT, the expiry time, and confidence level. Be a God-level accurate trader.";
        
        try {
            const response = await fetch(`https://googleapis.com{API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }]
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            chat.innerText = aiText;

            if(aiText.toLowerCase().includes("call") || aiText.toLowerCase().includes("up")) {
                mBtn.innerText = "CALL ⬆️"; mBtn.style.background = "#00ff88"; mBtn.style.color="#000";
            } else if(aiText.toLowerCase().includes("put") || aiText.toLowerCase().includes("down")) {
                mBtn.innerText = "PUT ⬇️"; mBtn.style.background = "#ff4d4d"; mBtn.style.color="#fff";
            }
        } catch (e) {
            chat.innerText = "Bhai, API ne jawab nahi diya. Shayad internet slow hai ya key limit reach ho gayi hai.";
            console.error(e);
        }
    }

    function drawAction() {
        dCtx.strokeStyle = "#ff00ff"; dCtx.lineWidth = 15;
        dCtx.strokeRect(dCanvas.width*0.6, dCanvas.height*0.2, 200, 100); 
        dCtx.strokeStyle = "#00d2ff";
        dCtx.beginPath(); dCtx.moveTo(0, dCanvas.height*0.6); dCtx.lineTo(dCanvas.width, dCanvas.height*0.6); dCtx.stroke();
    }
</script>
</body>
</html>
