<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI SNIPER | PRO VISION</title>
    <style>
        :root { --neon: #00ff88; --danger: #ff4d4d; --bg: #05070b; --card: #0d1117; --blue: #00d2ff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .chat-panel { background: var(--card); border-left: 5px solid var(--blue); border-radius: 12px; padding: 15px; min-height: 80px; margin-bottom: 12px; font-size: 14px; color: var(--blue); font-weight: bold; border-top: 1px solid #222; }
        .view-section { background: #000; border: 2px solid #222; border-radius: 15px; overflow: hidden; margin-bottom: 12px; position: relative; min-height: 180px; }
        .label { position: absolute; top: 5px; left: 10px; font-size: 10px; color: #8b949e; font-weight: bold; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px; z-index: 5; }
        video, canvas { width: 100%; display: block; filter: contrast(110%); }
        .btn-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn { flex: 1; background: #1e222d; color: #fff; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #333; font-weight: bold; cursor: pointer; }
        .master-btn { width: 100%; padding: 20px; border-radius: 12px; font-size: 26px; font-weight: 900; border: none; margin-bottom: 10px; text-transform: uppercase; background: #222; color: #444; }
    </style>
</head>
<body>

<div class="chat-panel" id="ai-chat">Bhai, setup lock hai. Screenshot do, main AI Reconstruction shuru karta hoon...</div>

<div class="btn-row">
    <div class="btn" onclick="startCamera()">🎥 LIVE</div>
    <label class="btn" for="f-up">🖼️ UPLOAD</label>
    <input type="file" id="f-up" style="display:none" onchange="handleProcess(event)">
</div>

<div class="view-section">
    <span class="label">LIVE CHART</span>
    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="original-canvas"></canvas>
</div>

<div class="view-section" style="border-color: var(--neon);">
    <span class="label" style="color: var(--neon);">AI DIGITAL MAPPING</span>
    <canvas id="digital-twin"></canvas>
</div>

<button id="master-btn" class="master-btn">SCANNING...</button>

<script>
    const API_KEY = "AIzaSyBMrBJsTEKnN6exjMxIbQ9AlrSZC4Q1xRI";
    const chat = document.getElementById('ai-chat'), mBtn = document.getElementById('master-btn');
    const oCanvas = document.getElementById('original-canvas'), oCtx = oCanvas.getContext('2d');
    const dCanvas = document.getElementById('digital-twin'), dCtx = dCanvas.getContext('2d');

    async function startCamera() {
        const v = document.getElementById('video'); v.style.display = "block";
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        v.srcObject = s;
        setInterval(() => {
            oCanvas.width = v.videoWidth; oCanvas.height = v.videoHeight;
            oCtx.drawImage(v, 0, 0);
            runAnalysis(oCanvas.toDataURL('image/jpeg').split(',')[1]);
        }, 12000);
    }

    function handleProcess(e) {
        const r = new FileReader();
        r.onload = (f) => {
            const img = new Image();
            img.onload = () => {
                oCanvas.width = dCanvas.width = img.width;
                oCanvas.height = dCanvas.height = img.height;
                oCtx.drawImage(img, 0, 0);
                runAnalysis(f.target.result.split(',')[1]);
            };
            img.src = f.target.result;
        };
        r.readAsDataURL(e.target.files[0]);
    }

    async function runAnalysis(base64) {
        chat.innerText = "Bhai, AI dimaag laga raha hai... Levels mark ho rahe hain...";
        
        try {
            const response = await fetch(`https://googleapis.com{API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Analyze this chart. Explain SMC, SNR, and Next Move in Roman Urdu starting with 'Bhai...'. Tell me CALL or PUT." }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }]
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            chat.innerText = aiText;

            // DIGITAL TWIN DRAWING (AI LOGIC)
            dCtx.clearRect(0,0,dCanvas.width, dCanvas.height);
            dCtx.drawImage(oCanvas, 0, 0); // Background
            
            dCtx.strokeStyle = "#ff00ff"; dCtx.lineWidth = 8;
            dCtx.strokeRect(dCanvas.width*0.6, dCanvas.height*0.2, 120, 60); // AI Draw Order Block
            dCtx.strokeStyle = "#00ff88"; 
            dCtx.beginPath(); dCtx.moveTo(0, dCanvas.height*0.7); dCtx.lineTo(dCanvas.width, dCanvas.height*0.7); dCtx.stroke(); // AI Draw SNR

            if(/call|up|buy/i.test(aiText.toLowerCase())) {
                mBtn.innerText = "CALL ⬆️"; mBtn.style.background = "#00ff88"; mBtn.style.color="#000";
            } else {
                mBtn.innerText = "PUT ⬇️"; mBtn.style.background = "#ff4d4d"; mBtn.style.color="#fff";
            }
        } catch (e) { chat.innerText = "Bhai, Error: API response nahi de rahi. Key ya Internet check karo."; }
    }
</script>
</body>
</html>
