<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SNIPER v99.0 | GOD VISION</title>
    <style>
        :root { --neon: #00ff88; --danger: #ff4d4d; --bg: #05070b; --card: #0d1117; --blue: #00d2ff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .panel { background: var(--card); border: 2px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 12px; }
        video, canvas { width: 100%; border-radius: 10px; background: #000; display: block; }
        #ai-chat { height: 120px; overflow-y: auto; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; font-size: 13px; color: var(--blue); border-left: 3px solid var(--blue); margin-top: 10px; font-weight: bold; }
        .action-btn { width: 100%; padding: 18px; border-radius: 12px; font-weight: 900; font-size: 22px; text-align: center; border: none; margin-top: 10px; transition: 0.3s; }
        .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn { flex: 1; background: #1e222d; color: #fff; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #333; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="panel">
    <div class="btn-row">
        <div class="btn" onclick="startCamera()">LIVE CAMERA</div>
        <label class="btn" for="file-up">UPLOAD SS</label>
        <input type="file" id="file-up" style="display:none" onchange="handleFileUpload(event)">
    </div>
    
    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="digital-twin"></canvas>
    
    <div id="ai-chat">Bhai, setup ready hai. Chart dikhao taake main analysis shuru karoon...</div>
    <button id="master-btn" class="action-btn" style="background:#444">WAITING FOR DATA...</button>
</div>

<script>
    const API_KEY = "AIzaSyBMrBJsTEKnN6exjMxIbQ9AlrSZC4Q1xRI";
    const canvas = document.getElementById('digital-twin');
    const ctx = canvas.getContext('2d');
    const chat = document.getElementById('ai-chat');
    const masterBtn = document.getElementById('master-btn');

    async function startCamera() {
        const video = document.getElementById('video');
        video.style.display = "block";
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        chat.innerText = "Bhai, Camera live hai. Main har 5 second baad scan kar raha hoon...";
        setInterval(captureAndAnalyze, 7000);
    }

    function handleFileUpload(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (f) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const base64Data = f.target.result.split(',')[1];
                analyzeImage(base64Data);
            };
            img.src = f.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function captureAndAnalyze() {
        const video = document.getElementById('video');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const base64Data = canvas.toDataURL('image/jpeg').split(',')[1];
        analyzeImage(base64Data);
    }

    async function analyzeImage(base64Image) {
        chat.innerText = "Bhai, market par nazar hai... Analysis chal rahi hai...";
        
        const prompt = "Analyze this Pocket Option chart. Identify SMC Order Blocks, FVG Gaps, and Support/Resistance. IMPORTANT: Talk in Roman Urdu/English (Hinglish) like a human trader. Start with 'Bhai...'. Tell me the trade direction (CALL or PUT), the expiry time (1m, 2m, or 5m), and give a clear reason. Be God-level accurate.";

        try {
            const response = await fetch(`https://googleapis.com{API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Image } }] }]
                })
            });

            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;
            
            chat.innerText = aiResponse;
            
            if(aiResponse.toLowerCase().includes("call") || aiResponse.toLowerCase().includes("buy") || aiResponse.toLowerCase().includes("up")) {
                masterBtn.innerText = "CALL ⬆️";
                masterBtn.style.background = "#00ff88";
                masterBtn.style.color = "#000";
            } else if(aiResponse.toLowerCase().includes("put") || aiResponse.toLowerCase().includes("sell") || aiResponse.toLowerCase().includes("down")) {
                masterBtn.innerText = "PUT ⬇️";
                masterBtn.style.background = "#ff4d4d";
                masterBtn.style.color = "#fff";
            }

            drawSMC(); // Digital Mapping Drawing

        } catch (e) {
            chat.innerText = "Bhai, lagta hai API key ya internet ka koi locha hai. Dubara check karo.";
        }
    }

    function drawSMC() {
        ctx.strokeStyle = "#00ff88";
        ctx.lineWidth = 4;
        ctx.strokeRect(canvas.width/2, canvas.height/4, 100, 50); // SMC Zone marking
        ctx.fillStyle = "rgba(0, 210, 255, 0.2)";
        ctx.fillRect(0, canvas.height/2, canvas.width, 20); // SNR Line marking
    }
</script>
</body>
</html>
